services:
  web:
    build:
      context: ./web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      - api

  api:
    build:
      context: ./api
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: postgres://appuser:apppass@db:5432/appdb?sslmode=disable
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-replace-with-google-oauth-client-id}
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/core.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  postgres_data:
